spring.application.name=minimarket
# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Configuracion JWT. En un ambiente real la clave debe definirse con JWT_SECRET.
app.jwt.secret=${JWT_SECRET:bWluaW1hcmtldC1wbHVzLWNsYXZlLWRlLWRlc2Fycm9sbG8tMjAyNg==}
app.jwt.expiration-ms=3600000

# Usuarios disponibles para demostrar los tres niveles de acceso solicitados.
app.demo-data.enabled=true
app.demo-data.admin-password=${ADMIN_PASSWORD:Admin123!}
app.demo-data.cajero-password=${CAJERO_PASSWORD:Cajero123!}
app.demo-data.cliente-password=${CLIENTE_PASSWORD:Cliente123!}
